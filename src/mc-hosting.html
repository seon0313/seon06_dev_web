<style>
/* ── Reset & Scope ────────────────────────────────────── */
#mc-app, #mc-app *, #mc-app *::before, #mc-app *::after {
  box-sizing: border-box;
}
#mc-app h1, #mc-app h2, #mc-app h3, #mc-app h4,
#mc-app p, #mc-app ul, #mc-app li, #mc-app a {
  all: unset;
}

/* ── Full-viewport layout ─────────────────────────────── */
#mc-app {
  --bg:    #f7f6f2;
  --card:  #ffffff;
  --text:  #111110;
  --muted: #888884;
  --ac:    #2c5f8a;
  --ac-s:  #dce8f3;
  --line:  #e5e3de;
  --fd:    'Cormorant Garamond', Georgia, serif;
  --fb:    'DM Sans', system-ui, sans-serif;

  display: block;
  font-family: var(--fb);
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;

  /* break out of the post body container */
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  margin-top: -64px;
  margin-bottom: -120px;
}

/* ── Auth View ────────────────────────────────────────── */
#mca-auth {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
}
#mc-app .auth-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 40px rgba(0,0,0,.06);
}
#mc-app .auth-title {
  display: block;
  font-family: var(--fd);
  font-size: 34px;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 6px;
}
#mc-app .auth-sub {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}
#mc-app .f-input {
  display: block;
  width: 100%;
  font-family: var(--fb);
  font-size: 14px;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  margin-bottom: 10px;
  transition: border-color .18s;
}
#mc-app .f-input:focus { border-color: var(--ac); }
#mc-app .auth-error {
  display: none;
  font-size: 13px;
  color: #c0392b;
  margin-bottom: 10px;
}
#mc-app .btn-primary {
  display: block;
  width: 100%;
  font-family: var(--fb);
  font-size: 14px;
  font-weight: 500;
  padding: 10px;
  border: none;
  border-radius: 100px;
  background: var(--ac);
  color: #fff;
  cursor: pointer;
  transition: background .2s;
}
#mc-app .btn-primary:hover:not([disabled]) { background: #1a3d5c; }
#mc-app .btn-primary[disabled] { opacity: .5; cursor: not-allowed; }

/* ── Dashboard ────────────────────────────────────────── */
#mca-dash { display: none; }

#mc-app .dash-header {
  position: sticky;
  top: 0;
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  background: rgba(247,246,242,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
  gap: 12px;
}
#mc-app .dash-logo {
  font-family: var(--fd);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--text);
}
#mc-app .code-badge {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 100px;
  background: var(--ac-s);
  color: var(--ac);
}
#mc-app .btn-ghost {
  font-family: var(--fb);
  font-size: 13px;
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .18s;
}
#mc-app .btn-ghost:hover { border-color: var(--text); color: var(--text); }

#mc-app .dash-body {
  padding: 36px 40px;
  max-width: 1060px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Section ──────────────────────────────────────────── */
#mc-app .mc-section {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 28px;
}
#mc-app .section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
#mc-app .section-title {
  font-family: var(--fd);
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
}

/* ── Server Grid ──────────────────────────────────────── */
#mc-app .srv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
#mc-app .srv-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 20px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  transition: border-color .2s;
}
#mc-app .srv-card:hover { border-color: var(--ac); }
#mc-app .srv-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#mc-app .srv-name { font-size: 15px; font-weight: 500; color: var(--text); }
#mc-app .srv-ver  { font-size: 12px; color: var(--muted); }
#mc-app .mc-empty {
  padding: 60px 0;
  text-align: center;
  border: 1px dashed var(--line);
  border-radius: 10px;
}
#mc-app .mc-muted { font-size: 13px; color: var(--muted); }

#mc-app .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
#mc-app .status-dot.on  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }
#mc-app .status-dot.off { background: var(--muted); }

#mc-app .type-badge {
  font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: .06em;
}
#mc-app .type-badge.vanilla { background: #d1fae5; color: #065f46; }
#mc-app .type-badge.forge   { background: #fef3c7; color: #92400e; }
#mc-app .type-badge.fabric  { background: #ede9fe; color: #5b21b6; }

#mc-app .card-actions {
  display: flex; gap: 6px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
}
#mc-app .btn-sm {
  font-family: var(--fb); font-size: 12px;
  padding: 5px 13px; border-radius: 6px;
  border: 1px solid var(--line);
  background: transparent; color: var(--muted);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
#mc-app .btn-sm:hover { border-color: var(--ac); color: var(--ac); }
#mc-app .btn-sm.del:hover { border-color: #c0392b; color: #c0392b; }

/* ── Create Form ──────────────────────────────────────── */
#mc-app .mc-form { display: flex; flex-direction: column; gap: 18px; }
#mc-app .mc-label {
  display: block;
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 6px;
}
#mc-app .type-row { display: flex; gap: 8px; flex-wrap: wrap; }
#mc-app .type-btn {
  font-family: var(--fb); font-size: 13px;
  padding: 6px 18px; border-radius: 100px;
  border: 1px solid var(--line);
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all .18s;
}
#mc-app .type-btn:hover { border-color: var(--text); color: var(--text); }
#mc-app .type-btn.active { background: var(--ac); color: #fff; border-color: var(--ac); }
#mc-app .mc-select {
  font-family: var(--fb); font-size: 14px;
  padding: 10px 14px; border: 1px solid var(--line);
  border-radius: 10px; background: var(--bg);
  color: var(--text); outline: none; width: 100%;
  appearance: none; cursor: pointer;
}
#mc-app .mc-select:focus { border-color: var(--ac); }

/* ── Console ──────────────────────────────────────────── */
#mc-app .console-wrap {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#mc-app .console-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: var(--bg); border-bottom: 1px solid var(--line);
}
#mc-app .console-label {
  font-size: 12px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted);
}
#mc-app .console-out {
  min-height: 260px; max-height: 360px;
  overflow-y: auto;
  background: #0f1117;
  padding: 18px;
  font-family: 'Fira Code', 'SF Mono', monospace;
  font-size: 13px; line-height: 1.7;
}
#mc-app .log-line { display: block; color: #cdd6f4; word-break: break-all; }
#mc-app .log-line.cmd { color: #a8ff78; }
#mc-app .console-input-row {
  display: flex; align-items: center;
  border-top: 1px solid #1e2030;
  background: #0f1117;
}
#mc-app .console-prompt {
  font-family: 'Fira Code', monospace;
  font-size: 13px; color: #a8ff78;
  padding: 10px 0 10px 14px; user-select: none;
}
#mc-app .console-inp {
  flex: 1;
  font-family: 'Fira Code', monospace;
  font-size: 13px; color: #cdd6f4;
  background: transparent; border: none; outline: none;
  padding: 10px 8px; caret-color: #a8ff78;
}
#mc-app .console-send {
  font-family: var(--fb); font-size: 12px;
  padding: 7px 14px; margin: 5px 8px 5px 0;
  border-radius: 6px; border: 1px solid #2a2d3e;
  background: #1e2030; color: #a8ff78;
  cursor: pointer; transition: background .15s;
}
#mc-app .console-send:hover { background: #2a2d3e; }

/* ── Responsive ───────────────────────────────────────── */
@media (max-width: 700px) {
  #mc-app .dash-header { padding: 14px 20px; }
  #mc-app .dash-body   { padding: 20px; }
  #mc-app .mc-section  { padding: 20px; }
  #mc-app .auth-card   { padding: 32px 22px; }
  #mc-app .srv-grid    { grid-template-columns: 1fr; }
  #mc-app .console-out { min-height: 200px; max-height: 240px; }
}
</style>

<div id="mc-app">

  <!-- ── Auth View ──────────────────────────────────── -->
  <div id="mca-auth">
    <div class="auth-card">
      <span class="auth-title">⬛ MC Hosting</span>
      <span class="auth-sub">인증코드를 입력하여 서버 관리 패널에 접근하세요.</span>
      <input id="mca-code" class="f-input" type="text" placeholder="인증코드" autocomplete="off" spellcheck="false" />
      <p id="mca-error" class="auth-error"></p>
      <button id="mca-auth-btn" class="btn-primary">접속</button>
    </div>
  </div>

  <!-- ── Dashboard View ────────────────────────────── -->
  <div id="mca-dash">
    <div class="dash-header">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="dash-logo">⬛ MC Hosting</span>
        <span id="mca-badge" class="code-badge"></span>
      </div>
      <button id="mca-logout" class="btn-ghost">로그아웃</button>
    </div>

    <div class="dash-body">

      <!-- 서버 목록 -->
      <div class="mc-section">
        <div class="section-head">
          <span class="section-title">내 서버</span>
          <button id="mca-toggle-create" class="btn-primary" style="width:auto;padding:8px 20px;font-size:13px">+ 새 서버</button>
        </div>
        <div id="mca-srv-grid"></div>
      </div>

      <!-- 서버 생성 폼 (hidden) -->
      <div id="mca-create" class="mc-section" style="display:none">
        <div class="section-head">
          <span class="section-title">새 서버 만들기</span>
        </div>
        <div class="mc-form">
          <div>
            <span class="mc-label">서버 종류</span>
            <div id="mca-type-row" class="type-row">
              <button class="type-btn active" data-t="Vanilla">Vanilla</button>
              <button class="type-btn" data-t="Forge">Forge</button>
              <button class="type-btn" data-t="Fabric">Fabric</button>
            </div>
          </div>
          <div>
            <label class="mc-label" for="mca-ver">버전</label>
            <select id="mca-ver" class="mc-select" disabled>
              <option value="">버전을 불러오는 중...</option>
            </select>
          </div>
          <div>
            <label class="mc-label" for="mca-name">서버 이름</label>
            <input id="mca-name" class="f-input" type="text" placeholder="My Server" style="margin-bottom:0" />
          </div>
          <div>
            <button id="mca-create-btn" class="btn-primary" style="width:auto;padding:9px 28px">서버 생성</button>
          </div>
          <p id="mca-create-error" class="auth-error" style="margin-bottom:0"></p>
        </div>
      </div>

      <!-- 콘솔 (hidden) -->
      <div id="mca-console" class="console-wrap" style="display:none">
        <div class="console-head">
          <span id="mca-con-title" class="console-label">콘솔</span>
          <button id="mca-con-close" class="btn-ghost">닫기</button>
        </div>
        <div id="mca-con-out" class="console-out"></div>
        <form id="mca-con-form" class="console-input-row">
          <span class="console-prompt">$</span>
          <input id="mca-con-inp" class="console-inp" type="text" placeholder="명령어 입력..." autocomplete="off" spellcheck="false" />
          <button type="submit" class="console-send">전송</button>
        </form>
      </div>

    </div>
  </div>

</div>
